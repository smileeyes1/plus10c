<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>🦸‍♂️ أسطورة أبطال الأعداد</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(#0a1a2f, #112d4e);
  color: #fff;
  text-align: center;
}

.screen, .box {
  width: 480px;
  margin: 30px auto;
  padding: 25px;
  border-radius: 20px;
  background: rgba(255,255,255,0.08);
  box-shadow: 0 0 25px #00eaff;
}

.fullscreen {
  position: fixed;
  inset: 0;
  background: linear-gradient(#062241,#0a1a2f);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

button {
  padding: 12px 30px;
  font-size: 20px;
  border-radius: 14px;
  background:#00eaff;
  border:none;
  cursor:pointer;
  margin:6px;
}

input {
  font-size:22px;
  padding:10px;
  width:200px;
  border-radius:10px;
  text-align:center;
}

.shapes { font-size:32px; margin:5px 0; }
#msg { min-height:34px; font-size:22px; margin-top:10px; }

.soft { background:#ffd166; color:#000; }
.star { background:#ffe066; color:#000; }
.gray { background:#adb5bd; color:#000; }

</style>
</head>

<body>

<!-- التمهيد المفاهيمي -->
<div id="intro" class="fullscreen">
  <h1>🌱 قبل أن نبدأ</h1>

  <p style="font-size:22px;max-width:500px;">
    ✅ <b>العدد</b>: يخبرنا كم عندنا من الأشياء<br><br>
    ✅ <b>الجمع</b>: يعني نضم الأشياء معًا<br><br>
    ✅ بعد الضمّ… نعدّ الكل بهدوء
  </p>

  <div>
    ثلاثة (٣)
    <div class="shapes">● ● ●</div>
    +
    اثنان (٢)
    <div class="shapes">● ●</div>
    =
    <div class="shapes">● ● ● ● ●</div>
    خمسة
  </div>

  <button onclick="startGame()">✅ فهمت – ابدأ المغامرة</button>
</div>

<!-- اللعبة -->
<div id="game" class="box" style="display:none;">

<h2>🦸‍♂️ أسطورة أبطال الأعداد</h2>

<button onclick="toggleSilent()" id="silentBtn">🔊 الوضع العادي</button>
<button onclick="toggleTraining()" id="trainBtn" class="gray">🧘‍♂️ تدريب بلا نقاط</button>

<div>المستوى: <span id="level">١</span></div>
<div id="scoreBox">النقاط: <span id="score">٠</span></div>

<div style="font-size:70px">👹</div>

<div style="width:90%;height:20px;background:#333;border-radius:10px;margin:10px auto;">
  <div id="hp" style="height:100%;width:100%;background:#4cff8f;border-radius:10px;"></div>
</div>

<div id="question"></div>

<input id="answer" type="number" placeholder="اكتب الجواب">
<br>

<button onclick="attack()">⚡ أجيب</button>
<br>

<button id="hintBtn" onclick="hint()" class="soft" style="display:none;">💡 تلميح صغير</button>
<button id="rethinkBtn" onclick="reExplain()" class="soft" style="display:none;">🔄 أريد أن أفهم بهدوء</button>
<button id="noShapesBtn" onclick="toggleShapes()" class="gray" style="display:none;">
🌱 هل تحب أن تحاول بدون الأشكال؟
</button>
<button id="starBtn" onclick="giveStar()" class="star" style="display:none;">
⭐ استحققتُ نجمة – سأكتبها في دفتري
</button>

<div id="msg"></div>

</div>

<script>
/* ===== البيانات الأساسية ===== */
const names={
0:"صفر",1:"واحد",2:"اثنان",3:"ثلاثة",4:"أربعة",
5:"خمسة",6:"ستة",7:"سبعة",8:"ثمانية",9:"تسعة",10:"عشرة"
};

let x=1,y=1;
let level=1, score=0;
let hp=100,maxHp=100;
let success=0, fail=0;
let silent=false, training=false;
let showShapes=true;

/* ===== أدوات ===== */
function shapes(n){ return showShapes?"● ".repeat(n):""; }
function arabic(n){return n.toString().replace(/\d/g,d=>"٠١٢٣٤٥٦٧٨٩"[d]);}
function msg(t,c="#cdb4db"){document.getElementById("msg").style.color=c;document.getElementById("msg").textContent=t;}

/* ===== أوضاع ===== */
function toggleSilent(){
 silent=!silent;
 silentBtn.textContent=silent?"🔕 وضع التركيز":"🔊 الوضع العادي";
 msg(silent?"🧘‍♂️ هدوء وتركيز":"");
}

function toggleTraining(){
 training=!training;
 trainBtn.textContent=training?"🧘‍♂️ تدريب بلا نقاط ✓":"🧘‍♂️ تدريب بلا نقاط";
 scoreBox.style.display=training?"none":"block";
 msg(training?"🌱 نتعلم بهدوء بلا نقاط":"");
}

function toggleShapes(){
 showShapes=!showShapes;
 noShapesBtn.textContent=showShapes?
"🌱 هل تحب أن تحاول بدون الأشكال؟":"✅ الأشكال عادت";
 newQuestion();
}

/* ===== بدء ===== */
function startGame(){
 intro.style.display="none";
 game.style.display="block";
 newQuestion();
}

/* ===== سؤال ===== */
function newQuestion(){
 hintBtn.style.display="none";
 rethinkBtn.style.display="none";

 if(success>=3) noShapesBtn.style.display="inline-block";
 else noShapesBtn.style.display="none";

 if(success>=3){x=Math.random()*8|0+1;y=Math.random()*(10-x+1)|0;}
 else if(fail>=2){x=Math.random()*3|0+1;y=Math.random()*3|0+1;}
 else{x=Math.random()*6|0+1;y=Math.random()*(10-x+1)|0;}

 question.innerHTML=`
 <b>${names[x]}</b> (${arabic(x)})<div class="shapes">${shapes(x)}</div>
 +
 <b>${names[y]}</b> (${arabic(y)})<div class="shapes">${shapes(y)}</div>
 <div>كم عدد الأشكال كلها؟</div>`;
}

/* ===== تلميح ===== */
function hint(){
 msg("💡 جرّب أن تضمّ الأشكال ثم تعدّها بهدوء","#ffd166");
 hintBtn.style.display="none";
}

/* ===== إعادة فهم ===== */
function reExplain(){
 question.innerHTML=`
 ${names[x]} <div class="shapes">${"● ".repeat(x)}</div>
 +
 ${names[y]} <div class="shapes">${"● ".repeat(y)}</div>
 <div>نضمّ… ثم نعدّ الكل</div>
 <b>العدد الصحيح: ${names[x+y]}</b>`;
}

/* ===== نجمة ===== */
function giveStar(){
 msg("⭐ رائع! أنت فخور بنفسك","#ffd166");
 starBtn.style.display="none";
}

/* ===== هجوم ===== */
function attack(){
 let ans=parseInt(answer.value);
 if(isNaN(ans))return;

 if(ans===x+y){
 success++;fail=0;
 if(!training)score+=10;
 hp-=20;
 msg("🌟 أحسنت!","#4cff8f");
 if(success>=3)starBtn.style.display="inline-block";
 }else{
 fail++;success=0;
 if(!training)score=Math.max(0,score-2);
 hp=Math.min(maxHp,hp+10);
 msg("✅ لا بأس، الصحيح هو "+names[x+y],"#ffd166");
 hintBtn.style.display="inline-block";
 rethinkBtn.style.display="inline-block";
 }

 if(hp<=0){
 level++;hp=maxHp;
 msg("🏆 مستوى جديد!","#00eaff");
 }

 levelSpan.textContent=arabic(level);
 scoreSpan.textContent=arabic(score);
 hp.style.width=(hp/maxHp*100)+"%";
 answer.value="";
 newQuestion();
}
</script>

</body>
</html>
