<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>🦸‍♂️ أبطال الأعداد</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(#0a1a2f,#112d4e);
  color:#fff;
  text-align:center;
}
.box{
  width:480px;
  margin:30px auto;
  padding:25px;
  border-radius:20px;
  background:rgba(255,255,255,.08);
  box-shadow:0 0 25px #00eaff;
}
button{
  padding:12px 28px;
  font-size:18px;
  border-radius:14px;
  background:#00eaff;
  border:none;
  cursor:pointer;
  margin:6px;
}
input{
  font-size:22px;
  padding:10px;
  width:200px;
  border-radius:10px;
  text-align:center;
}
.shapes{font-size:32px;}
#msg{min-height:36px;font-size:22px;margin-top:10px;}

.soft{background:#ffd166;color:#000;}
.gray{background:#adb5bd;color:#000;}
</style>
</head>

<body>

<div class="box">
<h2>🦸‍♂️ أسطورة أبطال الأعداد</h2>

<div>المستوى: <span id="level">١</span></div>
<div>النقاط: <span id="score">٠</span></div>
<div>محاولات هذا المستوى: <span id="tries">٠</span></div>

<div style="font-size:70px">👹</div>

<div style="width:90%;height:18px;background:#333;border-radius:10px;margin:10px auto;">
  <div id="hp" style="width:100%;height:100%;background:#4cff8f;border-radius:10px;"></div>
</div>

<div id="question"></div>

<input id="answer" type="number" placeholder="اكتب الجواب">
<br>
<button onclick="attack()">⚡ أجيب</button>

<div id="msg"></div>
</div>

<script>
/* ===== عناصر ===== */
const question=document.getElementById("question");
const levelSpan=document.getElementById("level");
const scoreSpan=document.getElementById("score");
const triesSpan=document.getElementById("tries");
const answer=document.getElementById("answer");
const hpBar=document.getElementById("hp");

/* ===== بيانات ===== */
const names={
0:"صفر",1:"واحد",2:"اثنان",3:"ثلاثة",4:"أربعة",
5:"خمسة",6:"ستة",7:"سبعة",8:"ثمانية",9:"تسعة",10:"عشرة"
};

let x=1,y=1;
let level=1, score=0;
let hp=100, maxHp=100;

/* 📊 إحصاءات */
let triesPerLevel={};

/* ===== تحميل التقدم ===== */
if(localStorage.heroData){
  const data=JSON.parse(localStorage.heroData);
  level=data.level;
  score=data.score;
  triesPerLevel=data.tries;
}

/* ===== أدوات ===== */
function arabic(n){
 return n.toString().replace(/\d/g,d=>"٠١٢٣٤٥٦٧٨٩"[d]);
}
function msg(t,c="#cdb4db"){
 const m=document.getElementById("msg");
 m.style.color=c; m.textContent=t;
}

/* 🔊 صوت ناعم */
function successSound(){
 const ctx=new AudioContext();
 const o=ctx.createOscillator();
 const g=ctx.createGain();
 o.frequency.value=600;
 o.type="sine";
 g.gain.value=0.05;
 o.connect(g); g.connect(ctx.destination);
 o.start();
 setTimeout(()=>{o.stop();ctx.close();},150);
}

/* 🧠 حفظ */
function saveProgress(){
 localStorage.heroData=JSON.stringify({
   level, score, tries:triesPerLevel
 });
}

/* ===== سؤال ===== */
function newQuestion(){
 x=Math.floor(Math.random()*6)+1;
 y=Math.floor(Math.random()*(10-x+1));

 question.innerHTML=`
 <b>${names[x]}</b> (${arabic(x)})
 <div class="shapes">${"● ".repeat(x)}</div>
 +
 <b>${names[y]}</b> (${arabic(y)})
 <div class="shapes">${"● ".repeat(y)}</div>
 <div>كم المجموع؟</div>
 `;

 triesPerLevel[level]=(triesPerLevel[level]||0)+1;
 triesSpan.textContent=arabic(triesPerLevel[level]);
 saveProgress();
}

/* ===== هجوم ===== */
function attack(){
 const ans=parseInt(answer.value);
 if(isNaN(ans))return;

 if(ans===x+y){
   successSound();
   score+=10;
   hp-=20;
   msg("🌟 إجابة صحيحة!","#4cff8f");
 }else{
   hp=Math.min(maxHp,hp+10);
   msg("✅ الصحيح هو "+names[x+y],"#ffd166");
 }

 if(hp<=0){
   level++;
   hp=maxHp;
   msg("🏆 مستوى جديد!","#00eaff");
 }

 levelSpan.textContent=arabic(level);
 scoreSpan.textContent=arabic(score);
 hpBar.style.width=(hp/maxHp*100)+"%";
 answer.value="";
 saveProgress();
 newQuestion();
}

/* ===== بدء ===== */
levelSpan.textContent=arabic(level);
scoreSpan.textContent=arabic(score);
newQuestion();
</script>

</body>
</html>
