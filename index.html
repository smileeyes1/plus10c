<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>🦸‍♂️ أسطورة أبطال الأعداد</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(#0a1a2f, #112d4e);
  color: #fff;
  text-align: center;
}

/* حاوية عامة */
.box {
  width: 480px;
  margin: 30px auto;
  padding: 25px;
  border-radius: 20px;
  background: rgba(255,255,255,0.08);
  box-shadow: 0 0 25px #00eaff;
}

/* شاشات كاملة */
.screen {
  position: fixed;
  inset: 0;
  background: linear-gradient(#062241, #0a1a2f);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 9999;
  padding: 20px;
}

button {
  padding: 14px 35px;
  font-size: 24px;
  border-radius: 15px;
  background: #00eaff;
  border: none;
  cursor: pointer;
  margin-top: 20px;
}

.shapes {
  font-size: 34px;
  margin: 10px 0;
}

input {
  padding: 10px;
  font-size: 24px;
  border-radius: 10px;
  width: 200px;
  text-align: center;
}

#message {
  min-height: 32px;
  margin-top: 10px;
  color: #cdb4db;
  font-size: 22px;
}
</style>
</head>

<body>

<!-- شاشة الشرح -->
<div id="intro" class="screen">
  <h1>🌱 قبل أن نبدأ</h1>

  <p style="font-size:22px;max-width:500px;">
    ✅ <strong>العدد</strong> يخبرنا: كم عندنا من الأشياء<br><br>
    ✅ <strong>الجمع</strong> يعني: نضم الأشياء معًا<br><br>
    ✅ بعد الضمّ… نعدّ الكل بهدوء
  </p>

  <div style="margin-top:20px;">
    <div><strong>ثلاثة</strong> (٣)</div>
    <div class="shapes">● ● ●</div>

    <div style="margin:10px;">＋</div>

    <div><strong>اثنان</strong> (٢)</div>
    <div class="shapes">● ●</div>

    <div style="margin-top:10px;">⬇️</div>

    <div><strong>خمسة</strong></div>
    <div class="shapes">● ● ● ● ●</div>
  </div>

  <button onclick="startGame()">✅ فهمت – ابدأ المغامرة</button>
</div>

<!-- اللعبة -->
<div id="game" class="box" style="display:none;">

<button onclick="toggleSilent()" id="silentBtn" style="font-size:18px;">
🔊 الوضع العادي
</button>

<h2 style="color:#00eaff;">🦸‍♂️ أسطورة أبطال الأعداد</h2>

<div>المستوى: <span id="level">١</span></div>
<div>النقاط: <span id="score">٠</span></div>

<div style="font-size:80px;margin:10px;">👹</div>

<div style="margin:10px;">
  طاقة الوحش:
  <div style="width:90%;height:22px;background:#333;border-radius:10px;margin:auto;">
    <div id="hpBar" style="height:100%;width:100%;background:#4cff8f;border-radius:10px;"></div>
  </div>
</div>

<div id="question" style="margin-top:20px;"></div>

<input type="number" id="answer" placeholder="اكتب الجواب">
<br>
<button onclick="attack()">هجوم ⚡</button>

<div id="message"></div>

</div>

<script>
/* ==== بيانات ==== */
const names = {
  0:"صفر",1:"واحد",2:"اثنان",3:"ثلاثة",4:"أربعة",
  5:"خمسة",6:"ستة",7:"سبعة",8:"ثمانية",9:"تسعة",10:"عشرة"
};

let x = 1, y = 1;
let level = 1;
let score = 0;
let hp = 100;
let maxHp = 100;
let silent = false;

let success = 0;
let fail = 0;
let startTime = 0;

/* ==== أدوات ==== */
function shapes(n){ return "● ".repeat(n); }
function arabic(n){ return n.toString().replace(/\d/g,d=>"٠١٢٣٤٥٦٧٨٩"[d]); }
function msg(t,c="#cdb4db"){ message.style.color=c; message.textContent=t; }

function toggleSilent(){
  silent = !silent;
  silentBtn.textContent = silent?"🔕 وضع التركيز":"🔊 الوضع العادي";
  msg(silent?"🧘‍♂️ وضع هادئ":"");
}

/* ==== بدء ==== */
function startGame(){
  intro.style.display="none";
  game.style.display="block";
  newQuestion();
}

/* ==== سؤال ذكي ==== */
function newQuestion(){
  startTime = Date.now();

  if(success >= 3){
    x = Math.floor(Math.random()*8)+1;
    y = Math.floor(Math.random()*(10-x+1));
  }else if(fail >= 2){
    x = Math.floor(Math.random()*4)+1;
    y = Math.floor(Math.random()*3)+1;
  }else{
    x = Math.floor(Math.random()*6)+1;
    y = Math.floor(Math.random()*(10-x+1));
  }

  question.innerHTML = `
    <div>
      <strong>${names[x]}</strong> (${arabic(x)})<br>
      <div class="shapes">${shapes(x)}</div>
      <div style="font-size:30px;">＋</div>
      <strong>${names[y]}</strong> (${arabic(y)})<br>
      <div class="shapes">${shapes(y)}</div>
      <div style="margin-top:10px;">كم عدد الأشكال كلها؟</div>
    </div>
  `;
}

/* ==== هجوم ==== */
function attack(){
  let ans = parseInt(answer.value);
  if(isNaN(ans)) return;

  if(ans === x+y){
    success++; fail=0;
    score+=10;
    hp-=20;
    msg("🌟 أحسنت!", "#4cff8f");
  }else{
    fail++; success=0;
    score=Math.max(0,score-2);
    hp=Math.min(maxHp,hp+10);
    msg("✅ الصحيح هو: "+names[x+y], "#ffd166");
  }

  if(hp<=0){
    level++;
    hp=maxHp;
    msg("🏆 مستوى جديد!", "#00eaff");
  }

  levelSpan.textContent = arabic(level);
  scoreSpan.textContent = arabic(score);
  hpBar.style.width = (hp/maxHp*100)+"%";
  answer.value="";
  newQuestion();
}
</script>

</body>
</html>
