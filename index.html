<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>🦸‍♂️ أسطورة أبطال الأعداد</title>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:linear-gradient(#0a1a2f,#112d4e);
  color:#fff;
  text-align:center;
}

.box{
  width:480px;
  margin:30px auto;
  padding:25px;
  border-radius:20px;
  background:rgba(255,255,255,0.08);
  box-shadow:0 0 25px #00eaff;
}

.fullscreen{
  position:fixed;
  inset:0;
  background:linear-gradient(#062241,#0a1a2f);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

button{
  padding:12px 30px;
  font-size:20px;
  border-radius:14px;
  background:#00eaff;
  border:none;
  cursor:pointer;
  margin:6px;
}

input{
  font-size:22px;
  padding:10px;
  width:200px;
  border-radius:10px;
  text-align:center;
}

.math{font-size:26px;margin:8px 0;color:#ffe066}
#msg{min-height:80px;white-space:pre-line}

.soft{background:#ffd166;color:#000}
.star{background:#ffe066;color:#000}
.next{background:#06d6a0;color:#000}

/* ❤️ القلوب */
.hearts{
  font-size:36px;
  margin:6px 0;
}

.hearts span{
  display:inline-block;
  animation:pulse 1s infinite;
}

@keyframes pulse{
  0%{transform:scale(1)}
  50%{transform:scale(1.25)}
  100%{transform:scale(1)}
}
</style>
</head>

<body>

<div id="intro" class="fullscreen">
  <h1>🌱 قبل أن نبدأ</h1>
  <p style="font-size:22px">
    ✅ العدد يخبرنا كم لدينا من الأشياء<br><br>
    ✅ الجمع يعني نضم الأشياء معًا<br><br>
    ✅ ثم نعدّ النتيجة
  </p>
  <button onclick="startGame()">✅ ابدأ المغامرة</button>
</div>

<div id="game" class="box" style="display:none">
  <h2>🦸‍♂️ أسطورة أبطال الأعداد</h2>

  <div>المستوى: <span id="level">١</span></div>
  <div>النقاط: <span id="score">٠</span></div>

  <div id="question"></div>

  <input id="answer" type="number" placeholder="اكتب الجواب">
  <br>
  <button onclick="attack()">⚡ أجيب</button>
  <br>

  <button id="rethinkBtn" class="soft" style="display:none" onclick="smartHint()">🔄 أفهم بهدوء</button>
  <button id="starBtn" class="star" style="display:none" onclick="giveStar()">⭐ نجمة للدفتر</button>
  <br>
  <button id="nextBtn" class="next" style="display:none" onclick="nextAfterMistake()">✅ فهمت، نكمل</button>

  <div id="msg"></div>
</div>

<script>
const intro=document.getElementById("intro");
const game=document.getElementById("game");
const question=document.getElementById("question");
const answer=document.getElementById("answer");
const scoreSpan=document.getElementById("score");

const names={
0:"صفر",1:"واحد",2:"اثنان",3:"ثلاثة",4:"أربعة",
5:"خمسة",6:"ستة",7:"سبعة",8:"ثمانية",9:"تسعة",10:"عشرة"
};

let x=1,y=1,score=0;

function arabic(n){
  return n.toString().replace(/\d/g,d=>"٠١٢٣٤٥٦٧٨٩"[d])
}

function hearts(n){
  let h="";
  for(let i=0;i<n;i++) h+="<span>❤️</span> ";
  return h;
}

function msg(t){
  document.getElementById("msg").textContent=t;
}

function startGame(){
  intro.style.display="none";
  game.style.display="block";
  newQuestion();
}

function newQuestion(){
  document.getElementById("rethinkBtn").style.display="none";
  document.getElementById("starBtn").style.display="none";
  document.getElementById("nextBtn").style.display="none";
  msg("");

  x=Math.floor(Math.random()*6)+1;
  y=Math.floor(Math.random()*(10-x+1));

  question.innerHTML=`
    <b>${names[x]}</b> (${arabic(x)})
    <div class="hearts">${hearts(x)}</div>
    +
    <b>${names[y]}</b> (${arabic(y)})
    <div class="hearts">${hearts(y)}</div>

    <div class="math">
      ${arabic(x)} + ${arabic(y)} = ؟
    </div>

    <div>كم المجموع؟</div>
  `;
}

function smartHint(){
  question.innerHTML=`
    <div>نعد القلوب بهدوء ❤️</div>
    <div class="hearts">${hearts(x+y)}</div>
    <div class="math">
      ${arabic(x)} + ${arabic(y)} = <b>${arabic(x+y)}</b>
    </div>
  `;
}

function giveStar(){
  msg("⭐ أحسنت! تسجيل النجمة دليل أنك تحاول وتتعلّم ✍️");
}

function attack(){
  const ans=parseInt(answer.value);
  if(isNaN(ans)) return;

  if(ans===x+y){
    score+=10;
    msg("🌟 إجابة صحيحة! أحسنت");
    document.getElementById("starBtn").style.display="inline-block";
    scoreSpan.textContent=arabic(score);

    answer.value="";
    setTimeout(newQuestion,1200);

  }else{
    smartHint();
    msg(
      "🤍 لا بأس\n" +
      "خذ وقتك وعدّ القلوب بهدوء\n" +
      "ثم اضغط ✅ فهمت"
    );

    document.getElementById("rethinkBtn").style.display="inline-block";
    document.getElementById("starBtn").style.display="inline-block";
    document.getElementById("nextBtn").style.display="inline-block";
    answer.value="";
  }
}

function nextAfterMistake(){
  newQuestion();
}
</script>

</body>
</html>
